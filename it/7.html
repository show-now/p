<html>
	<head>
		<title>Time Table</title>
		<style>
			table {
				border: 1px solid black;
			}
			
			th, td {
				border: 1px solid black;
				padding: 5px;
				text-align: center;
			}
		</style>
	</head>
	<body>
		
		<table>
			<tr>
				<th>Day</th>
				<th>9:45 - 10:45</th>
				<th>10:45 - 11:45</th>
				<th>11:45 - 12:45</th>
				<th>12:45 - 1:45</th>
				<th>1:45 - 2:45</th>
				<th>2:45 - 3:45</th>
				<th>3:45 - 4:45</th>
			</tr>
			
			<tr>
				<th>Monday</th>
				<td>Lang</td>
				<td>IT</td>
				<td>AI</td>
				<td rowspan="5">LUNCH</td>
				<td>EH</td>
				<td colspan="2">AI - LAB</td>
			</tr>
			
			<tr>
				<th>Tuesday</th>
				<td>EH</td>
				<td colspan="2">DAA - LAB</td>
				<td>IT</td>
				<td>AI</td>
				<td>DAA</td>
			</tr>
			
			<tr>
				<th>Wednesday</th>
				<td>Lang</td>
				<td colspan="2">PS</td>
				<td>AI</td>
				<td>ID</td>
				<td>DAA</td>
			</tr>

			<tr>
				<th>Thursday</th>
				<td>Lang</td>
				<td>IT</td>
				<td>AI</td>
				<td>EH</td>
				<td colspan="2">IT - LAB</td>
			</tr>
			
			<tr>
				<th>Friday</th>
				<td>EH</td>
				<td>AI</td>
				<td>DAA</td>
				<td>IT</td>
				<td colspan="2">DAA - LAB</td>
			</tr>
		</table>
		
	</body>
</html>
