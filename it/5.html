<html>
	<head>
		<title>Inline, Internal and External Styling</title>
		<link rel="stylesheet" type="text/css" href="style.css">
		<style>
			.internal {
				color: red;
			}
		</style>
	</head>
	<body>
		<h1 style="color: blue">Inline CSS</h1>
		<p style="color: blue">This is a inline style</p>
		
		<h1 class="internal">Internal CSS</h1>
		<p class="internal">This is a internal style</p> 
		
		<h1 class="external">External CSS</h1>
		<p class="external">This is a external style</p>
	</body>
</html>


style.css
.external {
	color: green;
}
